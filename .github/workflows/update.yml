name: Fetch V2Ray Configs

on:
  push:
    branches:
      - main
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    permissions:
      contents: write

    env:
      # Opt into Node.js 24 for all JS actions (avoids deprecation errors after June 2026)
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        run: python fetch_configs.py

      - name: Commit and push updated configs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🔄 auto-update configs"
          file_pattern: config.txt
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
