name: Fetch V2Ray Configs

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 12

    permissions:
      contents: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout latest main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        run: python fetch_configs.py

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add config.txt

          # Nothing changed → skip commit entirely
          if git diff --cached --quiet; then
            echo "⏭ No changes — skipping commit."
            exit 0
          fi

          git commit -m "🔄 auto-update configs"

          # Push — if rejected (another run beat us), rebase with our version winning
          git push origin main || {
            echo "⚠ Push rejected — rebasing with our config.txt..."
            git fetch origin main
            git rebase -X theirs origin/main
            git push origin main
          }
